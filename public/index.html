<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itinerary Reviewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --navy: #1A1A2E;
      --blue: #3B6FD4;
      --blue-light: #EBF0FC;
      --text: #1A1A2E;
      --muted: #6B7280;
      --border: #E4E2DC;
      --green: #16A34A;
      --green-bg: #DCFCE7;
      --yellow: #B45309;
      --yellow-bg: #FEF3C7;
      --red: #DC2626;
      --red-bg: #FEE2E2;
      --sky: #0284C7;
      --sky-bg: #E0F2FE;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 16px 64px;
    }

    /* ── Header ── */
    header {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 0 32px;
      text-align: center;
    }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--navy);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle { color: var(--muted); margin-top: 6px; font-size: 15px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    /* ── Input section ── */
    .input-section { max-width: 760px; margin: 0 auto 28px; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; }
    .tab-btn {
      padding: 14px 16px;
      font-size: 14px; font-weight: 500;
      color: var(--muted);
      background: none; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: all .15s; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; padding: 24px; }
    .tab-panel.active { display: block; }

    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    input[type="url"], textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--bg); transition: border-color .15s, box-shadow .15s; outline: none;
    }
    input[type="url"]:focus, textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,111,212,.12);
    }
    textarea { resize: vertical; min-height: 220px; line-height: 1.6; font-size: 13px; }

    .url-hint { margin-top: 8px; font-size: 12px; color: var(--muted); }

    .fetch-btn {
      margin-top: 12px; padding: 8px 16px;
      background: var(--blue-light); color: var(--blue);
      border: 1px solid #C7D8F8; border-radius: 7px;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s;
    }
    .fetch-btn:hover { background: #dce8fb; }
    .fetch-btn:disabled { opacity: .5; cursor: not-allowed; }

    .analyze-wrap { padding: 0 24px 24px; display: flex; align-items: center; gap: 12px; }

    .analyze-btn {
      padding: 11px 28px;
      background: var(--navy); color: #fff;
      border: none; border-radius: 9px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; gap: 8px;
    }
    .analyze-btn:hover { opacity: .88; }
    .analyze-btn:active { transform: scale(.98); }
    .analyze-btn:disabled { opacity: .45; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: var(--red-bg); color: var(--red);
      padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Results ── */
    #results { max-width: 760px; margin: 0 auto; display: none; }
    #results.visible { display: block; }

    /* General score + trip name header */
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
    }
    .trip-name-wrap { flex: 1; }
    .trip-name { font-size: 22px; font-weight: 700; }
    .clear-btn {
      padding: 6px 14px; background: none;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap;
    }
    .clear-btn:hover { background: var(--border); }

    /* General score badge */
    .general-score-badge {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 90px; height: 90px; border-radius: 50%;
      color: #fff; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    .gs-value { font-size: 28px; font-weight: 800; line-height: 1; }
    .gs-denom { font-size: 13px; opacity: .75; font-weight: 500; }
    .gs-label { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; opacity: .8; margin-top: 2px; }

    /* Verdict card */
    .verdict-card { padding: 20px 24px; margin-bottom: 20px; background: var(--navy); color: #fff; border-radius: var(--radius); }
    .verdict-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; opacity: .6; text-transform: uppercase; margin-bottom: 6px; }
    .verdict-text { font-size: 16px; font-weight: 500; line-height: 1.5; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    @media(max-width: 520px) { .two-col { grid-template-columns: 1fr; } }
    .mini-list-label { font-size: 11px; font-weight: 600; letter-spacing: .8px; opacity: .6; text-transform: uppercase; margin-bottom: 8px; }
    .mini-list { list-style: none; }
    .mini-list li { font-size: 13px; opacity: .85; padding: 3px 0 3px 16px; position: relative; line-height: 1.45; }
    .mini-list li::before { content: '–'; position: absolute; left: 0; opacity: .5; }

    /* Summary bar */
    .summary-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-pill {
      flex: 1; min-width: 110px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; text-align: center;
    }
    .summary-pill .sp-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .summary-pill .sp-val { font-size: 20px; font-weight: 700; }
    .summary-pill .sp-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Day cards */
    .day-card { margin-bottom: 16px; overflow: hidden; }
    .day-header {
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; border-bottom: 1px solid transparent; transition: background .15s;
    }
    .day-header:hover { background: #FAFAF8; }
    .day-header.open { border-bottom-color: var(--border); }
    .day-title { font-size: 15px; font-weight: 600; }
    .day-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 99px; letter-spacing: .3px;
    }
    .badge-ideal     { background: var(--green-bg);  color: var(--green); }
    .badge-light     { background: var(--sky-bg);    color: var(--sky);   }
    .badge-busy      { background: var(--yellow-bg); color: var(--yellow);}
    .badge-overloaded { background: var(--red-bg);   color: var(--red);   }

    /* Feasibility badge in header */
    .badge-ok       { background: var(--green-bg);  color: var(--green); }
    .badge-warn-med  { background: var(--yellow-bg); color: var(--yellow);}
    .badge-warn-high { background: var(--red-bg);    color: var(--red);   }

    .chevron { transition: transform .2s; font-size: 14px; color: var(--muted); }
    .day-header.open .chevron { transform: rotate(180deg); }

    .day-body { padding: 20px; display: none; }
    .day-body.open { display: block; }

    /* ── Feasibility section ── */
    .feasibility-section { margin-bottom: 18px; }
    .feasibility-ok {
      display: flex; align-items: center; gap: 8px;
      background: var(--green-bg); color: var(--green);
      padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
    }
    .feasibility-issues-wrap {
      border: 1px solid #FCA5A5; border-radius: 8px; overflow: hidden;
    }
    .feasibility-issues-wrap.severity-medium {
      border-color: #FCD34D;
    }
    .feasibility-title {
      padding: 10px 14px; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      background: var(--red-bg); color: var(--red);
      display: flex; align-items: center; gap: 6px;
    }
    .feasibility-title.medium { background: var(--yellow-bg); color: var(--yellow); }
    .feasibility-issue {
      display: flex; gap: 12px; padding: 12px 14px;
      border-top: 1px solid #FCA5A5; align-items: flex-start;
    }
    .feasibility-issue.medium { border-top-color: #FCD34D; }
    .severity-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
    }
    .severity-dot.high   { background: var(--red); }
    .severity-dot.medium { background: var(--yellow); }
    .severity-dot.low    { background: var(--sky); }
    .issue-activity { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .issue-text { font-size: 13px; color: var(--muted); line-height: 1.45; }

    /* ── Score metric boxes ── */
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    @media(max-width: 520px) { .metrics-grid { grid-template-columns: 1fr; } }

    .metric-box { background: var(--bg); border-radius: 8px; padding: 14px; }
    .metric-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 10px; }

    /* Score bar (replaces stars) */
    .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .score-num { font-size: 22px; font-weight: 800; line-height: 1; min-width: 32px; }
    .score-denom { font-size: 12px; color: var(--muted); font-weight: 500; }
    .score-bar-track {
      flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
    .metric-note { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Activity count box */
    .activity-count-val { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .activity-rating-pill {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 99px; margin-bottom: 6px;
    }

    /* Suggestions */
    .suggestions-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 8px; }
    .suggestions-list { list-style: none; }
    .suggestions-list li {
      font-size: 13px; padding: 9px 12px;
      background: var(--blue-light); border-left: 3px solid var(--blue);
      border-radius: 0 6px 6px 0; margin-bottom: 6px;
      color: #1e3a6e; line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✈</div>
    <h1>Itinerary Reviewer</h1>
  </div>
  <p class="subtitle">AI-powered pacing, flow &amp; feasibility check for travel itineraries</p>
</header>

<div class="input-section card">
  <div class="tabs">
    <button class="tab-btn active" data-tab="sheets">Google Sheets URL</button>
    <button class="tab-btn" data-tab="paste">Paste Itinerary</button>
  </div>

  <div class="tab-panel active" id="tab-sheets">
    <label for="sheets-url">Share link</label>
    <input type="url" id="sheets-url" placeholder="https://docs.google.com/spreadsheets/d/…" />
    <p class="url-hint">Make sure the sheet is set to <strong>"Anyone with the link can view"</strong> before pasting.</p>
    <button class="fetch-btn" id="fetch-btn">Load sheet →</button>
    <div id="sheet-preview" style="margin-top:14px; display:none;">
      <label>Preview (loaded)</label>
      <textarea id="sheet-content" rows="8" readonly style="opacity:.7;"></textarea>
    </div>
  </div>

  <div class="tab-panel" id="tab-paste">
    <label for="paste-area">Itinerary text</label>
    <textarea id="paste-area" placeholder="Paste your itinerary here — day headers, activities, times, locations…"></textarea>
  </div>

  <div class="analyze-wrap">
    <button class="analyze-btn" id="analyze-btn">
      <div class="spinner"></div>
      <span class="btn-text">Analyze itinerary</span>
    </button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<!-- Results -->
<div id="results">
  <div class="results-header">
    <div class="trip-name-wrap">
      <div class="trip-name" id="trip-name"></div>
    </div>
    <div id="general-score-badge" class="general-score-badge"></div>
    <button class="clear-btn" id="clear-btn">Start over</button>
  </div>

  <div class="verdict-card">
    <div class="verdict-label">Overall Assessment</div>
    <div class="verdict-text" id="verdict-text"></div>
    <div class="two-col">
      <div>
        <div class="mini-list-label">Strengths</div>
        <ul class="mini-list" id="strengths-list"></ul>
      </div>
      <div>
        <div class="mini-list-label">Top priorities</div>
        <ul class="mini-list" id="changes-list"></ul>
      </div>
    </div>
  </div>

  <div class="summary-bar" id="summary-bar"></div>
  <div id="days-container"></div>
</div>

<script>
  // ── Tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── Fetch Google Sheet ────────────────────────────────────────────────────
  document.getElementById('fetch-btn').addEventListener('click', async () => {
    const url = document.getElementById('sheets-url').value.trim();
    if (!url) return showError('Please enter a Google Sheets URL.');
    clearError();
    const btn = document.getElementById('fetch-btn');
    btn.disabled = true; btn.textContent = 'Loading…';
    try {
      const res = await fetch('/api/fetch-sheet?url=' + encodeURIComponent(url));
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to load sheet'); }
      const csv = await res.text();
      document.getElementById('sheet-content').value = csv;
      document.getElementById('sheet-preview').style.display = 'block';
      btn.textContent = '✓ Loaded — click Analyze';
    } catch (err) {
      showError(err.message);
      btn.textContent = 'Load sheet →';
    } finally { btn.disabled = false; }
  });

  // ── Analyze ───────────────────────────────────────────────────────────────
  document.getElementById('analyze-btn').addEventListener('click', async () => {
    const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
    let itinerary = activeTab === 'sheets'
      ? document.getElementById('sheet-content').value.trim()
      : document.getElementById('paste-area').value.trim();

    if (!itinerary) {
      showError(activeTab === 'sheets' ? 'Please load a Google Sheet first.' : 'Please paste your itinerary.');
      return;
    }
    clearError(); setLoading(true); hideResults();

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ itinerary })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      renderResults(data);
    } catch (err) {
      showError(err.message);
    } finally { setLoading(false); }
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    hideResults();
    document.getElementById('paste-area').value = '';
    document.getElementById('sheet-content').value = '';
    document.getElementById('sheets-url').value = '';
    document.getElementById('sheet-preview').style.display = 'none';
    document.getElementById('fetch-btn').textContent = 'Load sheet →';
  });

  // ── Render results ────────────────────────────────────────────────────────
  function renderResults(data) {
    const days = data.days || [];
    const gs = data.generalScore ?? null;

    // Trip name
    document.getElementById('trip-name').textContent = data.tripName || 'Itinerary Review';

    // General score badge
    const badge = document.getElementById('general-score-badge');
    if (gs !== null) {
      const bgColor = gs >= 8 ? '#15803D' : gs >= 6 ? '#B45309' : '#B91C1C';
      badge.style.background = bgColor;
      badge.innerHTML = `
        <div class="gs-value">${gs}</div>
        <div class="gs-denom">/10</div>
        <div class="gs-label">Score</div>`;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }

    // Verdict
    document.getElementById('verdict-text').textContent = data.overall?.verdict || '';

    // Strengths
    const sl = document.getElementById('strengths-list');
    sl.innerHTML = (data.overall?.strengths || []).map(s => `<li>${escHtml(s)}</li>`).join('');

    // Top changes
    const cl = document.getElementById('changes-list');
    cl.innerHTML = (data.overall?.topChanges || []).map(c => `<li>${escHtml(c)}</li>`).join('');

    // Summary bar
    const avgPace    = avg(days.map(d => d.pace?.score));
    const avgFlow    = avg(days.map(d => d.flow?.score));
    const avgBalance = avg(days.map(d => d.balance?.score));
    const packed     = days.filter(d => ['Busy','Overloaded'].includes(d.activityCount?.rating)).length;
    const feasIssues = days.filter(d => d.feasibility?.hasIssues).length;

    document.getElementById('summary-bar').innerHTML = `
      <div class="summary-pill">
        <div class="sp-label">Days</div>
        <div class="sp-val">${days.length}</div>
        <div class="sp-sub">in itinerary</div>
      </div>
      <div class="summary-pill">
        <div class="sp-label">Avg Pace</div>
        <div class="sp-val" style="color:${scoreColor(avgPace)}">${avgPace}<span style="font-size:13px;color:var(--muted)">/10</span></div>
        <div class="sp-sub">${ratingLabel(avgPace)}</div>
      </div>
      <div class="summary-pill">
        <div class="sp-label">Avg Flow</div>
        <div class="sp-val" style="color:${scoreColor(avgFlow)}">${avgFlow}<span style="font-size:13px;color:var(--muted)">/10</span></div>
        <div class="sp-sub">${ratingLabel(avgFlow)}</div>
      </div>
      <div class="summary-pill">
        <div class="sp-label">Balance</div>
        <div class="sp-val" style="color:${scoreColor(avgBalance)}">${avgBalance}<span style="font-size:13px;color:var(--muted)">/10</span></div>
        <div class="sp-sub">activity mix</div>
      </div>
      ${packed > 0 ? `
      <div class="summary-pill" style="border-color:#FCA5A5; background:#FEF2F2;">
        <div class="sp-label" style="color:var(--red)">Packed days</div>
        <div class="sp-val" style="color:var(--red)">${packed}</div>
        <div class="sp-sub" style="color:var(--red)">need trimming</div>
      </div>` : ''}
      ${feasIssues > 0 ? `
      <div class="summary-pill" style="border-color:#FCD34D; background:#FFFBEB;">
        <div class="sp-label" style="color:var(--yellow)">Schedule issues</div>
        <div class="sp-val" style="color:var(--yellow)">${feasIssues}</div>
        <div class="sp-sub" style="color:var(--yellow)">day${feasIssues > 1 ? 's' : ''} affected</div>
      </div>` : ''}
    `;

    // Day cards
    const container = document.getElementById('days-container');
    container.innerHTML = '';

    days.forEach((day, i) => {
      const card = document.createElement('div');
      card.className = 'card day-card';

      const rating = day.activityCount?.rating || 'Ideal';
      const actBadgeClass = { Light: 'badge-light', Ideal: 'badge-ideal', Busy: 'badge-busy', Overloaded: 'badge-overloaded' }[rating] || 'badge-ideal';

      const hasIssues = day.feasibility?.hasIssues;
      const highSeverity = (day.feasibility?.issues || []).some(i => i.severity === 'high');
      const feasBadge = hasIssues
        ? `<span class="badge ${highSeverity ? 'badge-warn-high' : 'badge-warn-med'}">${highSeverity ? '⚠ Schedule issue' : '⚠ Check hours'}</span>`
        : `<span class="badge badge-ok">✓ Feasible</span>`;

      card.innerHTML = `
        <div class="day-header" id="dh-${i}">
          <div class="day-title">${escHtml(day.day)}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="day-badges">
              <span class="badge ${actBadgeClass}">${rating} · ${day.activityCount?.count ?? '?'} activities</span>
              ${feasBadge}
            </div>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="day-body" id="db-${i}">
          ${feasibilitySection(day.feasibility)}
          <div class="metrics-grid">
            ${metricBox('Pace', day.pace?.score, day.pace?.note)}
            ${metricBox('Flow', day.flow?.score, day.flow?.note)}
            ${activityBox(day.activityCount)}
            ${metricBox('Balance', day.balance?.score, day.balance?.note)}
          </div>
          ${suggestionsList(day.suggestions)}
        </div>`;

      container.appendChild(card);

      document.getElementById(`dh-${i}`).addEventListener('click', () => {
        document.getElementById(`dh-${i}`).classList.toggle('open');
        document.getElementById(`db-${i}`).classList.toggle('open');
      });

      // First card open by default
      if (i === 0) {
        document.getElementById('dh-0').classList.add('open');
        document.getElementById('db-0').classList.add('open');
      }
    });

    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Component helpers ─────────────────────────────────────────────────────
  function metricBox(name, score, note) {
    const s = score ?? 0;
    const pct = (s / 10) * 100;
    const color = scoreColor(s);
    return `
      <div class="metric-box">
        <div class="metric-name">${escHtml(name)}</div>
        <div class="score-row">
          <span class="score-num" style="color:${color}">${s}</span>
          <span class="score-denom">/10</span>
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>
        <div class="metric-note">${escHtml(note || '')}</div>
      </div>`;
  }

  function activityBox(ac) {
    if (!ac) return metricBox('Activities', null, '');
    const rating = ac.rating || 'Ideal';
    const pillColor = { Light: '#0284C7', Ideal: '#16A34A', Busy: '#B45309', Overloaded: '#DC2626' }[rating] || '#16A34A';
    const pillBg   = { Light: '#E0F2FE', Ideal: '#DCFCE7', Busy: '#FEF3C7', Overloaded: '#FEE2E2' }[rating] || '#DCFCE7';
    return `
      <div class="metric-box">
        <div class="metric-name">Activity Count</div>
        <div class="activity-count-val" style="color:${pillColor}">${ac.count ?? '?'}</div>
        <span class="activity-rating-pill" style="background:${pillBg};color:${pillColor}">${rating}</span>
        <div class="metric-note">${escHtml(ac.note || '')}</div>
      </div>`;
  }

  function feasibilitySection(feas) {
    if (!feas) return '';
    if (!feas.hasIssues || !feas.issues?.length) {
      return `<div class="feasibility-section"><div class="feasibility-ok">✓ No schedule issues found for this day</div></div>`;
    }
    const highExists = feas.issues.some(i => i.severity === 'high');
    const issuesHtml = feas.issues.map(issue => {
      const sev = issue.severity || 'medium';
      return `
        <div class="feasibility-issue ${sev !== 'high' ? 'medium' : ''}">
          <div class="severity-dot ${sev}"></div>
          <div>
            <div class="issue-activity">${escHtml(issue.activity)}</div>
            <div class="issue-text">${escHtml(issue.issue)}</div>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="feasibility-section">
        <div class="feasibility-issues-wrap ${!highExists ? 'severity-medium' : ''}">
          <div class="feasibility-title ${!highExists ? 'medium' : ''}">
            ⚠ Schedule Issues to Review
          </div>
          ${issuesHtml}
        </div>
      </div>`;
  }

  function suggestionsList(suggestions) {
    if (!suggestions?.length) return '';
    return `
      <div class="suggestions-title">Suggestions</div>
      <ul class="suggestions-list">${suggestions.map(s => `<li>${escHtml(s)}</li>`).join('')}</ul>`;
  }

  // ── Utilities ─────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function avg(arr) {
    const valid = arr.filter(n => typeof n === 'number');
    if (!valid.length) return '–';
    return (valid.reduce((a,b) => a+b, 0) / valid.length).toFixed(1);
  }
  function scoreColor(s) {
    const n = parseFloat(s);
    if (isNaN(n)) return 'var(--muted)';
    if (n >= 8) return 'var(--green)';
    if (n >= 6) return 'var(--yellow)';
    return 'var(--red)';
  }
  function ratingLabel(v) {
    const n = parseFloat(v);
    if (isNaN(n)) return '';
    if (n >= 8) return 'Excellent';
    if (n >= 6) return 'Good';
    if (n >= 4) return 'Fair';
    return 'Poor';
  }

  function setLoading(on) {
    const btn = document.getElementById('analyze-btn');
    if (on) btn.classList.add('loading'); else btn.classList.remove('loading');
    btn.disabled = on;
  }
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.classList.add('visible');
  }
  function clearError() { document.getElementById('error-msg').classList.remove('visible'); }
  function hideResults() { document.getElementById('results').classList.remove('visible'); }
</script>
</body>
</html>
